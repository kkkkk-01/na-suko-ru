;; ==========================================================
;; Dialplan - ナースコールシステム Phase1
;; ==========================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
; API サーバーのURL（通話イベント通知用）
API_URL=http://api:3001/api/v1

;; --- メインコンテキスト ---
[nursecall]

; --- 利用者 → 職員 呼出 (1xxx → 2xxx) ---
; 利用者が職員の内線番号にダイヤル
exten => _2XXX,1,NoOp(=== Nurse Call: ${CALLERID(num)} -> ${EXTEN} ===)
 same => n,Set(CALL_START=${EPOCH})
 same => n,Set(CDR(userfield)=nursecall)
 ; API に通話開始を通知
 same => n,System(curl -s -X POST ${API_URL}/calls/asterisk/event -H "Content-Type: application/json" -d '{"event":"ringing","caller":"${CALLERID(num)}","callee":"${EXTEN}","channel":"${CHANNEL}"}')
 ; 30秒間呼出
 same => n,Dial(PJSIP/${EXTEN},30,tTkK)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?answered:noanswer)
 ; 応答あり
 same => n(answered),NoOp(Call answered - Duration: $[${EPOCH}-${CALL_START}]s)
 same => n,System(curl -s -X POST ${API_URL}/calls/asterisk/event -H "Content-Type: application/json" -d '{"event":"answered","caller":"${CALLERID(num)}","callee":"${EXTEN}","channel":"${CHANNEL}"}')
 same => n,Hangup()
 ; 応答なし
 same => n(noanswer),NoOp(Call not answered: ${DIALSTATUS})
 same => n,System(curl -s -X POST ${API_URL}/calls/asterisk/event -H "Content-Type: application/json" -d '{"event":"missed","caller":"${CALLERID(num)}","callee":"${EXTEN}","status":"${DIALSTATUS}","channel":"${CHANNEL}"}')
 same => n,Hangup()

; --- 内線同士の通話 ---
exten => _XXXX,1,NoOp(=== Internal Call: ${CALLERID(num)} -> ${EXTEN} ===)
 same => n,Dial(PJSIP/${EXTEN},30,tTkK)
 same => n,Hangup()

; --- テスト用エコー ---
exten => 9999,1,NoOp(=== Echo Test ===)
 same => n,Answer()
 same => n,Playback(hello-world)
 same => n,Echo()
 same => n,Hangup()

; --- 通話終了ハンドラ ---
[nursecall-hangup]
exten => h,1,NoOp(=== Call Hangup: ${CHANNEL} Duration: ${CDR(billsec)}s ===)
 same => n,System(curl -s -X POST ${API_URL}/calls/asterisk/event -H "Content-Type: application/json" -d '{"event":"ended","channel":"${CHANNEL}","duration":"${CDR(billsec)}","disposition":"${CDR(disposition)}"}')
