;; ==========================================================
;; PJSIP Configuration - ナースコールシステム Phase1
;; ==========================================================

;; --- トランスポート設定 ---

; UDP トランスポート（SIPクライアント用）
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; TCP トランスポート
[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; WebSocket トランスポート（WebRTC用）
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

;; --- デフォルトテンプレート ---

; 利用者端末テンプレート（WebRTC対応）
[resident-template](!)
type=endpoint
context=nursecall
disallow=all
allow=opus
allow=ulaw
allow=alaw
dtls_auto_generate_cert=yes
webrtc=yes
media_encryption=dtls
dtls_verify=no
dtls_setup=actpass
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
use_avpf=yes
direct_media=no
force_rport=yes
rewrite_contact=yes

; 職員端末テンプレート（SIPクライアント用）
[staff-template](!)
type=endpoint
context=nursecall
disallow=all
allow=opus
allow=ulaw
allow=alaw
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

;; --- 利用者端末 (1001-1010) ---

; 利用者1001
[resident_1001](resident-template)
auth=resident_1001_auth
aors=resident_1001_aor

[resident_1001_auth]
type=auth
auth_type=userpass
username=resident_1001
password=res1001pass

[resident_1001_aor]
type=aor
max_contacts=1
remove_existing=yes
default_expiration=300

